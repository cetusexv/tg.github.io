<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Bank Withdraw</title>

<style>

body{
background:#000;
color:white;
font-family:Arial;
margin:0;
padding:15px;
}

.container{
max-width:500px;
margin:auto;
}

h2{
margin-bottom:20px;
font-size:26px;
}

.form-box{
background:#0f0f0f;
padding:20px;
border-radius:12px;
border:1px solid #222;
}

label{
display:block;
margin-top:15px;
margin-bottom:6px;
color:#aaa;
font-size:14px;
}

input,select{
width:100%;
padding:13px;
background:#151515;
border:1px solid #333;
border-radius:8px;
color:white;
font-size:14px;
}

.row{
display:flex;
gap:10px;
margin-top:10px;
}

.row input{
flex:1;
}

.withdraw-row{
display:flex;
gap:10px;
margin-top:10px;
}

.withdraw-row input{
flex:1;
}

.withdraw-btn{
background:#f0b90b;
border:none;
padding:13px 20px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.summary{
background:#161616;
margin-top:20px;
padding:18px;
border-radius:10px;
border:1px solid #222;
font-size:14px;
}

.small{
font-size:12px;
color:#888;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h2>Bank Withdraw</h2>

<div class="form-box">

<label>Select Country</label>
<select id="country" onchange="loadBanks()">
<option value="usa">United States</option>
<option value="uk">United Kingdom</option>
<option value="canada">Canada</option>
</select>

<label>Select Bank</label>
<select id="bank"></select>

<label>Account Holder Name</label>
<input type="text" placeholder="Account Holder Name">

<div class="row">
<input type="text" placeholder="Account Number">
<input type="text" placeholder="Routing Number">
</div>

<label>SWIFT / BIC Code</label>
<input type="text" placeholder="SWIFT Code">

<label>Email Address</label>
<input type="email" placeholder="Email Address">

<label>Withdraw Amount (USDT)</label>

<div class="withdraw-row">
<input type="number" id="amount" placeholder="Amount" oninput="calculate()">
<button class="withdraw-btn">Withdraw</button>
</div>

<div class="summary">
<b>Withdraw Summary</b>
<p>Amount: <span id="sumAmount">0</span> USDT</p>
<p>Fee: <span style="color:#f0b90b" id="fee">0</span> USDT</p>
<p>You Receive: <span id="receive">0</span> USDT</p>
</div>

<p class="small">
SSL encrypted secure bank transfer • Processing Time: 5-10 Minutes
</p>

</div>
</div>

<script>

const banks = {

usa:[
"JPMorgan Chase",
"Bank of America",
"Wells Fargo",
"Citibank",
"U.S. Bank",
"PNC Bank",
"Capital One",
"TD Bank",
"Truist Bank",
"Goldman Sachs Bank",
"Morgan Stanley Bank",
"HSBC Bank USA",
"Charles Schwab Bank",
"American Express Bank",
"Discover Bank",
"Ally Bank",
"Fifth Third Bank",
"KeyBank",
"Huntington Bank",
"Regions Bank",
"M&T Bank",
"BMO Harris Bank",
"Citizens Bank",
"First Republic Bank",
"First Horizon Bank",
"Comerica Bank",
"Synovus Bank",
"Popular Bank",
"East West Bank",
"Western Alliance Bank",
"BankUnited",
"Valley National Bank",
"PacWest Bank",
"Webster Bank",
"UMB Bank",
"Frost Bank",
"Old National Bank",
"Associated Bank",
"Cadence Bank",
"Wintrust Bank",
"Prosperity Bank",
"Texas Capital Bank",
"FirstBank",
"Arvest Bank",
"Santander Bank",
"Flagstar Bank",
"Union Bank",
"City National Bank",
"Customers Bank",
"First Interstate Bank",
"Glacier Bank",
"Zions Bank",
"BOK Financial",
"Trustmark Bank"
],

uk:[
"HSBC",
"Barclays",
"Lloyds Bank",
"NatWest",
"Standard Chartered"
],

canada:[
"Royal Bank of Canada",
"TD Canada Trust",
"Scotiabank",
"BMO",
"CIBC"
]

};

function loadBanks(){

let country=document.getElementById("country").value;
let bankSelect=document.getElementById("bank");

bankSelect.innerHTML="";

banks[country].forEach(bank=>{
let option=document.createElement("option");
option.text=bank;
bankSelect.add(option);
});

}

loadBanks();

function calculate(){

let amount=parseFloat(document.getElementById("amount").value)||0;

let fee=amount*0.02;

let receive=amount-fee;

document.getElementById("sumAmount").innerText=amount.toFixed(2);
document.getElementById("fee").innerText=fee.toFixed(2);
document.getElementById("receive").innerText=receive.toFixed(2);

}

</script>

</body>
</html>
